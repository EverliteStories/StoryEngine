<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Everlight Bedtime Adventure</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Everlight Bedtime Adventure</h1>

    <section class="card">
      <label>
        Child name
        <input id="childName" type="text" placeholder="Enter name" />
      </label>

      
      <label>
        Pet Companion
         <select id="petArchetype">
         <option value="forest guardian">Forest Guardian 🐺</option>
         <option value="tiny dragon">Tiny Dragon 🐉</option>
         <option value="ocean spirit">Ocean Spirit 🐬</option>
         <option value="cloud fox">Cloud Fox ☁️🦊</option>
         </select>
      </label>
      

      <label>
  Special Skill
  <select id="skillArchetype">
    <option value="lightweaving">Lightweaving ✨</option>
    <option value="harmony voice">Harmony Voice 🎶</option>
    <option value="pattern sight">Pattern Sight 🔍</option>
    <option value="heartshield">Heartshield 💛</option>
  </select>
  </label>

      <label>
        Personality trait
        <input id="personalityTrait" type="text" value="kind" />
      </label>
      <label>
  Story
  <select id="storySelect">
    <option value="curtain_of_cozy_stars.json">The Curtain of Cozy Stars</option>
    <option value="moon_garden.json">The Moon Garden</option>
  </select>
</label>
      <button id="startBtn">Start Story</button>
    </section>

    <section id="storyCard" class="card hidden">
      <h2 id="storyTitle"></h2>
      <p id="storyText"></p>
      <div id="choices"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
